# Base 4-agent configuration — PJM-RTO, 1-week simulation
# Agents: VRFB, PV+Battery, PEM electrolyzer, alkaline electrolyzer.

market:
  iso: PJM
  zone: PJM-RTO
  dam_steps: 24          # 24 × 1h
  rtm_interval_min: 5    # 5-min cadence
  rtm_horizon: 6         # H=6 steps (30 min lookahead)
  l_max_mw:  1.5         # PCC import cap: 1.5 MW interconnection agreement

settlement:
  gamma_plus: 1.5
  gamma_minus: 2.0

agents:
  pv_battery:
    pv_capacity_kw: 1000             # 1 MW commercial rooftop solar
    battery_capacity_kw: 1000        # 1 MW Li-ion paired with PV
    battery_energy_kwh: 4000         # 4 MWh (4h duration)
    roundtrip_efficiency: 0.92
    soc_min_kwh: 400                 # 10% of capacity
    soc_max_kwh: 3800                # 95% of capacity
    soc_init_kwh: 2000

  vrfb:
    capacity_kw: 1000                # 1 MW utility-scale flow battery
    energy_kwh: 7000                 # 7 MWh (7h duration)
    roundtrip_efficiency: 0.75
    soc_min_kwh: 700                 # 10%
    soc_max_kwh: 6300                # 90%
    soc_init_kwh: 3500

  electrolyzer_pem:
    name: "Electrolyzer-PEM"
    capacity_kw: 2000                # 2 MW industrial PEM unit
    h2_production_kg_per_kwh: 0.02   # ~50 kWh/kg H2 (PEM)
    tank_min_kg: 0
    tank_max_kg: 800
    tank_init_kg: 200
    h2_price_per_kg: 4.0
    ramp_rate_kw_per_min: 100
    h2_daily_target_kg: 400          # take-or-pay: 400 kg/day (~833 kW avg)

  electrolyzer_alk:
    name: "Electrolyzer-Alk"
    capacity_kw: 1500                # 1.5 MW alkaline unit
    h2_production_kg_per_kwh: 0.018  # ~55 kWh/kg H2
    tank_min_kg: 0
    tank_max_kg: 1200
    tank_init_kg: 320
    h2_price_per_kg: 4.0
    ramp_rate_kw_per_min: 30
    h2_daily_target_kg: 300          # take-or-pay: 300 kg/day (~694 kW avg)

simulation:
  start_date: "2024-07-08"
  n_days: 5
  seed: 42

forecast:
  pv_noise_std_fraction: 0.12
  rtm_pv_ar1_phi: 0.85
  rtm_price_ar1_phi: 0.70
